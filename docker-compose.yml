services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=true                          # ← ENABLE security
      - xpack.security.http.ssl.enabled=false                # ← keep HTTP (no TLS inside Docker)
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}                 # ← from .env
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system              # ← built-in Kibana user
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD} # ← from .env
      - SERVER_PUBLICBASEURL=${KIBANA_PUBLIC_URL}        # ← your domain
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"

  node-exporter:
    build: .
    container_name: node-exporter
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ES_NODE=http://elasticsearch:9200
      - ES_USERNAME=elastic                              # ← add auth
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - API_URL=${API_URL}
    restart: unless-stopped

volumes:
  elasticsearch-data: